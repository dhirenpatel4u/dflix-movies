<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Player</title>

<style>

html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

background:#000;

}

iframe{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

border:none;

}

#cursor{

position:fixed;

width:18px;

height:18px;

background:red;

border-radius:50%;

z-index:99999;

left:50%;

top:50%;

pointer-events:none;

}

</style>

</head>

<body>

<iframe id="frame" allowfullscreen></iframe>

<div id="cursor"></div>

<script src="player.js"></script>

</body>

</html>
